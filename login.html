<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fire Alert - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-box shadow-lg">
      <div class="text-center mb-4">
        <img src="https://www.pngarts.com/files/10/Fire-Emoji-Transparent-Images.png" alt="Fire Alert Logo" class="logo mb-2" />
        <h4 class="fw-bold text-danger">FIRE ALERT</h4>
        <p class="text-muted">Bem-vindo de volta! Faça login para continuar.</p>
      </div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" required placeholder="Digite seu e-mail" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" required placeholder="Digite sua senha" />
        </div>
        <button type="submit" class="btn btn-danger w-100"><a href="/projeto">Entrar</a></button>
      </form>

      <div class="text-center mt-3">
        <a href="#" class="small text-muted">Esqueceu a senha?</a><br>      
        <a href="/cadastro" class="small fw-bold">Criar nova conta</a>
      </div>
    </div>
  </div>  

  <script src="/static/auth.js"></script>
</body>
</html>
