<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fire Alert - Cadastro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-box shadow-lg">
      <div class="text-center mb-4">
        <img src="https://www.pngarts.com/files/10/Fire-Emoji-Transparent-Images.png" alt="Fire Alert Logo" class="logo mb-2" />
        <h4 class="fw-bold text-danger">FIRE ALERT</h4>
        <p class="text-muted">Crie sua conta para começar!</p>
      </div>

      <form id="registerForm">
        <div class="mb-3">
          <label for="name" class="form-label">Nome completo</label>
          <input type="text" class="form-control" id="name" required placeholder="Seu nome" />
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" required placeholder="Seu e-mail" />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <input type="password" class="form-control" id="password" required placeholder="Crie uma senha" />
        </div>
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmar Senha</label>
          <input type="password" class="form-control" id="confirmPassword" required placeholder="Repita sua senha" />
        </div>
        <button type="submit" class="btn btn-danger w-100">Cadastrar</button>
      </form>

      <div class="text-center mt-3">
        <a href="/login" class="small fw-bold">Já tem conta? Fazer login</a>
      </div>
    </div>
  </div>

  <script src="/static/auth.js"></script>
</body>
</html>
