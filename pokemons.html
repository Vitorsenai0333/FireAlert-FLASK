<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémons</title>
  <link rel="stylesheet" href="/static/pokemon.css">
</head>
<body>
  <header class="topo">
    <img src="https://pngimg.com/d/pokeball_PNG24.png" width="50" height="50">
    <h1>Pokémons</h1>
    <div class="busca">
      <input id="searchInput" type="text" placeholder="Buscar Pokémon">
      <button id="searchBtn">Buscar</button>
    </div>
  </header>

  <main class="conteudo">
    <div id="pokemonGrid" class="grid"></div>
    <div class="navegacao">
      <button id="prevBtn">Anterior</button>
      <button id="nextBtn">Próximo</button>
    </div>
  </main>

  <div id="pokemonModal" class="modal">
    <div class="modal-content">
      <span class="fechar" id="closeModal">&times;</span>
      <h2 id="pokemonName"></h2>
      <div id="pokemonDetails"></div>
    </div>
  </div>

  <script src="/static/pokemons.js"></script>
</body>
</html>
